<div class="p-4 surface-ground min-h-screen">
    <div class="grid grid-cols-12 gap-6">
        <!-- Panel de Filtros -->
        <div class="col-span-12 md:col-span-3">
            <app-filtro-venta (onFilterChange)="handleFilter($event)"></app-filtro-venta>
        </div>

        <!-- Listado de Resultados -->
        <div class="col-span-12 md:col-span-9">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 m-0">Viviendas en venta</h1>
                    <p class="text-gray-500 m-0 mt-1">Zaragoza y alrededores</p>
                </div>
                <span class="bg-primary-50 text-primary-700 px-3 py-1 rounded-full font-semibold"> {{ inmueblesFiltrados.length }} inmuebles encontrados </span>
            </div>

            <p-dataView #dv [value]="inmueblesFiltrados" layout="list" [rows]="10" [paginator]="true">
                <ng-template #list let-items>
                    <div class="flex flex-col gap-4">
                        <div *ngFor="let item of items">
                            <app-venta [inmueble]="item"></app-venta>
                        </div>
                    </div>
                </ng-template>

                <ng-template #empty>
                    <div class="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-gray-100 shadow-sm">
                        <i class="pi pi-search text-6xl text-gray-200 mb-4"></i>
                        <h3 class="text-xl font-semibold text-gray-700">No hay resultados</h3>
                        <p class="text-gray-500">Prueba a ajustar los filtros para encontrar lo que buscas.</p>
                        <button pButton label="Limpiar filtros" class="p-button-text mt-2"></button>
                    </div>
                </ng-template>
            </p-dataView>
        </div>
    </div>
</div>
